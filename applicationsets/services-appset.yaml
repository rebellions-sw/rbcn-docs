# ApplicationSet — services-catalog/services/<svc>-<env>.yaml 1개당 ArgoCD Application 1개 자동 생성
#
# 사용:
#   1. services-catalog/services.yaml 에 entry 추가
#   2. scripts/regen-catalog.py 실행 (또는 rbcn catalog regen)  → services/*.yaml 평탄화
#   3. PR → merge → ArgoCD 가 자동 onboard (수동 작업 0)
#
# Cluster 매핑 (각 service 파일에 cluster URL 직접 명시):
#   - dev   → https://kubernetes.default.svc  (현 데모는 모두 dev hub)
#   - stage → https://kubernetes.default.svc  (실 운영시 다른 cluster URL)
#   - prod  → https://kubernetes.default.svc  (실 운영시 다른 cluster URL)
#
# 장점: matrix 없음 → 단순. 1 file = 1 application = 1 PR diff.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: services
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - git:
        repoURL: https://github.com/rebellions-sw/rbcn-docs.git
        revision: main
        files:
          - path: "services-catalog/services/*.yaml"

  template:
    metadata:
      name: '{{.name}}-{{.env}}'
      labels:
        owner: '{{.owner}}'
        tier:  '{{.tier}}'
        type:  '{{.type}}'
        env:   '{{.env}}'
        managed-by: applicationset
      annotations:
        notifications.argoproj.io/subscribe.on-sync-failed.slack: rbcn-alerts
        argocd.argoproj.io/manifest-generate-paths: '.'
    spec:
      project: default
      source:
        repoURL:        '{{.repo}}'
        targetRevision: '{{.branch}}'
        path:           'overlays/{{.env}}'
      destination:
        server:    '{{.cluster}}'
        namespace: '{{.name}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

  syncPolicy:
    preserveResourcesOnDeletion: false
