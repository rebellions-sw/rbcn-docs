# Reusable build workflow (모든 서비스 공용)
#
# 호출 예시 (모든 service repo 의 .github/workflows/ci.yml 에 1번):
#
#   name: ci
#   on: [push, pull_request]
#   jobs:
#     build:
#       uses: rebellions-sw/.github/.github/workflows/reusable-build.yaml@main
#       with:
#         service: my-service
#         language: go              # go|node|python (정보용)
#       secrets: inherit
#
# 산출물: 이미지 build/push + SBOM(Syft) + Trivy(scan) + Cosign 서명 + dev manifest tag bump.
# 빌드 엔진: docker buildx on rbcn VM runner (`[self-hosted, rbcn]`).
#   - rbcn-ci-runner-01 에는 docker daemon 이 있어서 buildx 사용 가능 (캐시 친화적).
#   - 가벼운 후속 job (manifest bump) 은 ARC `[self-hosted, rebel-k8s-runner]` 사용.
# 조직에서 이 workflow 를 한번 수정하면 모든 service repo 가 즉시 반영됨 (drift 0).

name: Reusable Build (docker buildx)

on:
  workflow_call:
    inputs:
      service:
        description: "Service name (also image name)"
        required: true
        type: string
      language:
        description: "go | node | python (informational)"
        required: false
        type: string
        default: "go"
      registry:
        required: false
        type: string
        default: "harbor.rebellions.ai"
      registry_project:
        description: "Harbor project (image path = registry/project/service)"
        required: false
        type: string
        default: "library"
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      context:
        required: false
        type: string
        default: "."
      runs-on:
        description: "JSON array of labels (build job 은 기본 rbcn VM runner: docker 사용 가능)"
        required: false
        type: string
        default: '["self-hosted","rbcn"]'
      bump_runs_on:
        description: "manifest bump job 용 runner (lightweight; ARC default)"
        required: false
        type: string
        default: '["self-hosted","rebel-k8s-runner"]'
      bump_dev:
        description: "Auto-bump manifest dev overlay tag"
        required: false
        type: boolean
        default: true
      sign:
        required: false
        type: boolean
        default: true
      sbom:
        required: false
        type: boolean
        default: true
      scan:
        required: false
        type: boolean
        default: true
      severity_fail:
        required: false
        type: string
        default: "CRITICAL,HIGH"
    secrets:
      HARBOR_USER:
        required: true
      HARBOR_PASS:
        required: true
      COSIGN_PRIVATE_KEY:
        required: false
      COSIGN_PASSWORD:
        required: false
      MANIFESTS_PAT:
        required: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      image: ${{ steps.meta.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute tag (semver-or-sha)
        id: meta
        shell: bash
        run: |
          set -e
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF##refs/tags/}"
          else
            TAG="$(date -u +%Y%m%d).${GITHUB_RUN_NUMBER}.${GITHUB_SHA::7}"
          fi
          IMG="${{ inputs.registry }}/${{ inputs.registry_project }}/${{ inputs.service }}:$TAG"
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"

      - name: Verify docker available
        shell: bash
        run: |
          set -e
          docker version
          docker buildx version || docker buildx install || true
          docker buildx version

      - name: Login to Harbor
        shell: bash
        env:
          REG:  ${{ inputs.registry }}
          USER: ${{ secrets.HARBOR_USER }}
          PASS: ${{ secrets.HARBOR_PASS }}
        run: |
          set -e
          echo "$PASS" | docker login "$REG" -u "$USER" --password-stdin

      - name: Build & push (docker buildx)
        id: build
        shell: bash
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          CONTEXT: ${{ inputs.context }}
          REG: ${{ inputs.registry }}
          PROJ: ${{ inputs.registry_project }}
          SVC: ${{ inputs.service }}
        run: |
          set -e
          # buildx builder 가 없으면 만들어 둠 (한번만, idempotent)
          docker buildx create --name rbcn-builder --use 2>/dev/null || \
            docker buildx use rbcn-builder

          # registry 캐시 (cache-from / cache-to) → 점진적 빌드 가속
          # metadata-file 로 digest 추출
          mkdir -p .build
          docker buildx build \
            --file "$DOCKERFILE" \
            --tag "$IMAGE" \
            --cache-from "type=registry,ref=$REG/$PROJ/$SVC-cache:buildcache" \
            --cache-to   "type=registry,ref=$REG/$PROJ/$SVC-cache:buildcache,mode=max" \
            --metadata-file .build/metadata.json \
            --push \
            "$CONTEXT"

          DIGEST=$(python3 -c "import json,sys; d=json.load(open('.build/metadata.json')); print(d.get('containerimage.digest',''))")
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Built: $IMAGE  digest=$DIGEST"

      - name: SBOM (Syft) + upload
        if: inputs.sbom
        shell: bash
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
        run: |
          set -e
          mkdir -p $HOME/.local/bin
          if ! command -v syft >/dev/null 2>&1; then
            curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
              | sh -s -- -b $HOME/.local/bin v1.18.1
            export PATH="$HOME/.local/bin:$PATH"
          fi
          syft "$IMAGE" -o spdx-json > "sbom-${{ inputs.service }}-${{ steps.meta.outputs.tag }}.spdx.json"
          echo "SBOM size: $(wc -c < sbom-${{ inputs.service }}-${{ steps.meta.outputs.tag }}.spdx.json) bytes"

      - name: Upload SBOM artifact
        if: inputs.sbom
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ inputs.service }}-${{ steps.meta.outputs.tag }}
          path: sbom-${{ inputs.service }}-${{ steps.meta.outputs.tag }}.spdx.json
          retention-days: 30

      - name: Trivy scan
        if: inputs.scan
        shell: bash
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          SEV:   ${{ inputs.severity_fail }}
        run: |
          set -e
          mkdir -p $HOME/.local/bin
          if ! command -v trivy >/dev/null 2>&1; then
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
              | sh -s -- -b $HOME/.local/bin v0.55.2
            export PATH="$HOME/.local/bin:$PATH"
          fi
          trivy image \
            --severity "$SEV" \
            --exit-code 1 \
            --ignore-unfixed \
            --no-progress \
            "$IMAGE"

      - name: Cosign install
        if: inputs.sign
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign (keyless via OIDC, fallback key)
        if: inputs.sign
        shell: bash
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
          COSIGN_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -e
          REF="$IMAGE"
          [ -n "$DIGEST" ] && REF="${IMAGE%:*}@$DIGEST"
          if [ -n "$COSIGN_KEY" ]; then
            echo "$COSIGN_KEY" > /tmp/cosign.key
            cosign sign --key /tmp/cosign.key -y "$REF"
            rm -f /tmp/cosign.key
          else
            cosign sign -y --identity-token "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$REF" || \
              echo "::warning::cosign keyless 실패 - COSIGN_PRIVATE_KEY 미설정 + OIDC 환경 미가용"
          fi

  bump-dev-manifest:
    needs: build
    if: inputs.bump_dev && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    runs-on: ${{ fromJSON(inputs.bump_runs_on) }}
    steps:
      - name: Checkout manifests
        uses: actions/checkout@v4
        with:
          repository: rebellions-sw/${{ inputs.service }}-manifests
          ref: dev
          token: ${{ secrets.MANIFESTS_PAT }}
          path: m

      - name: Install yq
        shell: bash
        run: |
          set -e
          mkdir -p $HOME/.local/bin
          curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o $HOME/.local/bin/yq
          chmod +x $HOME/.local/bin/yq
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Bump dev image tag
        shell: bash
        env:
          REG:  ${{ inputs.registry }}
          PROJ: ${{ inputs.registry_project }}
          SVC:  ${{ inputs.service }}
          TAG:  ${{ needs.build.outputs.tag }}
        run: |
          set -e
          cd m/overlays/dev
          yq -i "(.images[] | select(.name == \"$REG/$PROJ/$SVC\").newTag) = \"$TAG\"" kustomization.yaml
          cat kustomization.yaml

      - name: Commit & push
        shell: bash
        run: |
          set -e
          cd m
          git config user.email "rbcn-ci@rebellions.ai"
          git config user.name  "rbcn-ci"
          git add -A
          git commit -m "chore(dev): bump ${{ inputs.service }} → ${{ needs.build.outputs.tag }}" || exit 0
          git push
